          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral(); maven { url 'https://repo.rikka.app/releases' }; maven { url 'https://jitpack.io' } }
          }
          rootProject.name = "屏幕刷新率"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.1.0' apply false }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.pmahz'
              compileSdk 34
              defaultConfig {
                  applicationId "com.pmahz"
                  minSdk 24
                  targetSdk 34
                  versionCode 1645
                  versionName "1.6.4.1"
              }
              signingConfigs {
                  debug {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }
              buildTypes {
                  debug {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                  }
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'dev.rikka.shizuku:api:13.1.5'
              implementation 'dev.rikka.shizuku:provider:13.1.5'
              implementation 'com.github.MuntashirAkon:libadb-android:1.0.1'
              implementation 'org.bouncycastle:bcprov-jdk15on:1.69'
              implementation 'org.bouncycastle:bcpkix-jdk15on:1.69'
              implementation 'org.conscrypt:conscrypt-android:2.5.2'
          }
          EOF


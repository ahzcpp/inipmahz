          EOF
          SCRIPTEOF
          chmod +x generate.sh
          ./generate.sh

      - name: 4. 用官方标准 Action 建立合规的 Gradle 包装器
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.0'
          generate-job-summary: true

      - name: 5. 编译生成 Debug APK
        run: gradle assembleDebug

      - name: 6. 提炼并分发 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: RefreshRate-1.6.4
          path: app/build/outputs/apk/debug/app-debug.apk

          # ----- 基础构建文件 -----
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral(); maven { url 'https://repo.rikka.app/releases' } }
          }
          rootProject.name = "屏幕刷新率"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.1.0' apply false }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.pmahz'
              compileSdk 34
              defaultConfig {
                  applicationId "com.pmahz"
                  minSdk 24
                  targetSdk 34
                  versionCode 1643
                  versionName "1.6.4_bate3"
              }
              signingConfigs {
                  debug {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }
              buildTypes {
                  debug {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                  }
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'dev.rikka.shizuku:api:13.1.5'
              implementation 'dev.rikka.shizuku:provider:13.1.5'
          }
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.WRITE_SETTINGS"/>
              <uses-permission android:name="android.permission.WRITE_SECURE_SETTINGS"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="moe.shizuku.manager.permission.API_V23"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />

              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:theme="@style/Theme.RefreshRate">
                  
                  <activity android:name=".AppearanceActivity" android:exported="false"/>
                  <activity android:name=".LanguageActivity" android:exported="false"/>
                  <activity android:name=".AppListActivity" android:exported="false"/>
                  <activity android:name=".AppRefreshConfigActivity" android:exported="false"/>
                  
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>

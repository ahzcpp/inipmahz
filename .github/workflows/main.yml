                      os = new DataOutputStream(process.getOutputStream());
                      os.writeBytes("service call SurfaceFlinger 1034 i32 " + (on ? 1 : 0) + "\n");
                      os.writeBytes("exit\n"); os.flush();
                      process.waitFor();

              private void checkForUpdate() {
                  Toast.makeText(getContext(), R.string.update_checking_toast, Toast.LENGTH_SHORT).show();
                  new Thread(() -> {
                      try {
                          String[] srcUrls = {
                              "https://raw.githubusercontent.com/ahzcpp/refresh-rate/main/update.json",
                              "https://cdn.jsdelivr.net/gh/ahzcpp/refresh-rate@main/update.json",
                              "https://gcore.jsdelivr.net/gh/ahzcpp/refresh-rate@main/update.json"
                          };
                          String jsonStr = null;
                          for (String src : srcUrls) {
                              try {
                                  java.net.URL u = new java.net.URL(src);
                                  java.net.HttpURLConnection conn = (java.net.HttpURLConnection) u.openConnection();
                                  conn.setConnectTimeout(5000);
                                  conn.setReadTimeout(5000);
                                  conn.setInstanceFollowRedirects(true);
                                  conn.setRequestProperty("Cache-Control", "no-cache");
                                  java.io.InputStream is = conn.getInputStream();
                                  java.io.ByteArrayOutputStream bos = new java.io.ByteArrayOutputStream();
                                  byte[] buf = new byte[4096];
                                  int len;
                                  while ((len = is.read(buf)) != -1) bos.write(buf, 0, len);
                                  is.close();
                                  conn.disconnect();
                                  String s = new String(bos.toByteArray(), "UTF-8");
                                  if (s.contains("versionCode")) { jsonStr = s; break; }
                              } catch (Exception exSrc) { jsonStr = null; }
                          }
                          if (jsonStr == null) throw new Exception("all update sources unreachable");
                          org.json.JSONObject obj = new org.json.JSONObject(jsonStr);
                          final int latestCode = obj.optInt("versionCode", 0);
                          final String latestName = obj.optString("versionName", "");
                          final String dlUrl = obj.optString("url", "");
                          final String desc = obj.optString("desc", "");
                          int cur = 0;
                          try { cur = requireContext().getPackageManager().getPackageInfo(requireContext().getPackageName(), 0).versionCode; } catch (Exception ignored) {}
                          final int curCode = cur;
                          if (getActivity() == null) return;
                          getActivity().runOnUiThread(() -> {
                              if (!isAdded()) return;
                              if (latestCode > curCode && !dlUrl.isEmpty()) {
                                  String updMsg = getString(R.string.update_available_msg, latestName);
                                  if (!desc.isEmpty()) {
                                      updMsg = updMsg + "\n\n" + getString(R.string.update_changelog_label) + "\n" + desc;
                                  }
                                  androidx.appcompat.app.AlertDialog updDlg = new androidx.appcompat.app.AlertDialog.Builder(requireContext())
                                          .setTitle(R.string.update_available_title)
                                          .setMessage(updMsg)
                                          .setPositiveButton(R.string.update_btn, (d, w) -> downloadAndInstall(dlUrl))
                                          .setNegativeButton(R.string.update_close, null)
                                          .create();
                                  if (updDlg.getWindow() != null) {
                                      updDlg.getWindow().setBackgroundDrawableResource(R.drawable.dialog_round_bg);
                                  }
                                  updDlg.show();
                              } else {
                                  Toast.makeText(getContext(), R.string.update_latest_toast, Toast.LENGTH_SHORT).show();
                              }
                          });
                      } catch (Exception e) {
                          if (getActivity() == null) return;
                          getActivity().runOnUiThread(() -> {
                              if (isAdded()) Toast.makeText(getContext(), R.string.update_check_fail, Toast.LENGTH_SHORT).show();
                          });
                      }
                  }).start();
              }



              private long updDownloadId = -1;
              private android.content.BroadcastReceiver updReceiver;

              private void downloadAndInstall(String url) {
                  try {
                      final android.content.Context appCtx = requireContext().getApplicationContext();
                      if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) {
                          if (!appCtx.getPackageManager().canRequestPackageInstalls()) {
                              Toast.makeText(getContext(), R.string.update_allow_install, Toast.LENGTH_LONG).show();
                              try {
                                  Intent st = new Intent(android.provider.Settings.ACTION_MANAGE_UNKNOWN_APP_SOURCES, Uri.parse("package:" + appCtx.getPackageName()));
                                  st.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                                  startActivity(st);
                              } catch (Exception ignored) {}
                              return;
                          }
                      }
                      Toast.makeText(getContext(), R.string.update_downloading, Toast.LENGTH_SHORT).show();
                      final java.io.File out = new java.io.File(appCtx.getExternalFilesDir(android.os.Environment.DIRECTORY_DOWNLOADS), "update.apk");
                      if (out.exists()) out.delete();
                      android.app.DownloadManager dm = (android.app.DownloadManager) appCtx.getSystemService(android.content.Context.DOWNLOAD_SERVICE);
                      android.app.DownloadManager.Request req = new android.app.DownloadManager.Request(Uri.parse(url));
                      req.setNotificationVisibility(android.app.DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                      req.setTitle(getString(R.string.app_name));
                      req.setMimeType("application/vnd.android.package-archive");
                      req.setDestinationInExternalFilesDir(appCtx, android.os.Environment.DIRECTORY_DOWNLOADS, "update.apk");
                      updDownloadId = dm.enqueue(req);
                      updReceiver = new android.content.BroadcastReceiver() {
                          @Override public void onReceive(android.content.Context ctx, Intent intent) {
                              long id = intent.getLongExtra(android.app.DownloadManager.EXTRA_DOWNLOAD_ID, -1);
                              if (id == updDownloadId) {
                                  try { ctx.unregisterReceiver(this); } catch (Exception ignored) {}
                                  installApk(ctx.getApplicationContext(), out);
                              }
                          }
                      };
                      android.content.IntentFilter filter = new android.content.IntentFilter(android.app.DownloadManager.ACTION_DOWNLOAD_COMPLETE);
                      androidx.core.content.ContextCompat.registerReceiver(appCtx, updReceiver, filter, androidx.core.content.ContextCompat.RECEIVER_EXPORTED);
                  } catch (Exception e) {
                      try { Toast.makeText(getContext(), R.string.update_check_fail, Toast.LENGTH_SHORT).show(); } catch (Exception ignored) {}
                  }
              }

              private void installApk(android.content.Context ctx, java.io.File file) {
                  try {
                      if (file == null || !file.exists()) return;
                      Uri uri;
                      if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.N) {
                          uri = androidx.core.content.FileProvider.getUriForFile(ctx, ctx.getPackageName() + ".fileprovider", file);
                      } else {
                          uri = Uri.fromFile(file);
                      }
                      Intent intent = new Intent(Intent.ACTION_VIEW);
                      intent.setDataAndType(uri, "application/vnd.android.package-archive");
                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                      ctx.startActivity(intent);
                  } catch (Exception ignored) {}
              }

              private void applyAlphaToViewGroup(ViewGroup parent, int cardAlpha, int textAlpha) {
                  for (int i = 0; i < parent.getChildCount(); i++) {
                      View child = parent.getChildAt(i);
                      if (child instanceof CardView) {
                          CardView cv = (CardView) child;
                          cv.setCardBackgroundColor(Color.argb(cardAlpha, 255, 255, 255));
                          cv.setCardElevation(0f);
                          cv.setMaxCardElevation(0f);
                      } else if (child instanceof TextView) {
                          child.setAlpha(textAlpha / 255f);
                      }
                      if (child instanceof ViewGroup) {
                          applyAlphaToViewGroup((ViewGroup) child, cardAlpha, textAlpha);
                      }
                  }
              }

              @Override public void onRequestPermissionsResult(int requestCode, @NonNull String[] permissions, @NonNull int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == 200) {
                      if (grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                      } else {
                          Toast.makeText(getContext(), R.string.notification_perm_denied, Toast.LENGTH_LONG).show();
                      }
                  }
              }

              private void showLogDialog(String logContent) {
                  if (getContext() == null) return;
                  java.io.File logDir = new java.io.File(requireContext().getCacheDir(), "logs");
                  logDir.mkdirs();
                  java.io.File logFile = new java.io.File(logDir, "refresh_rate_log.txt");
                  try {
                      java.io.FileWriter fw = new java.io.FileWriter(logFile);
                      fw.write(logContent); fw.close();
                  } catch (Exception ignored) {}

                  ScrollView sv = new ScrollView(getContext());
                  TextView tv = new TextView(getContext());
                  tv.setText(logContent);
                  tv.setPadding(30, 30, 30, 30);
                  tv.setTextSize(android.util.TypedValue.COMPLEX_UNIT_SP, 12);
                  tv.setTextColor(Color.BLACK);
                  sv.addView(tv);
                  new AlertDialog.Builder(getContext())
                          .setTitle(R.string.log_dialog_title)
                          .setView(sv)
                          .setPositiveButton(R.string.log_dialog_close, null)
                          .setNeutralButton(R.string.log_dialog_share, (d, w) -> {
                              try {
                                  android.net.Uri fileUri = androidx.core.content.FileProvider.getUriForFile(
                                      requireContext(),
                                      requireContext().getPackageName() + ".fileprovider",
                                      logFile);
                                  Intent share = new Intent(Intent.ACTION_SEND);
                                  share.setType("text/plain");
                                  share.putExtra(Intent.EXTRA_STREAM, fileUri);
                                  share.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                                  startActivity(Intent.createChooser(share, getString(R.string.log_dialog_share)));
                              } catch (Exception e) {
                                  Intent share = new Intent(Intent.ACTION_SEND);
                                  share.setType("text/plain");
                                  share.putExtra(Intent.EXTRA_TEXT, logContent);
                                  startActivity(Intent.createChooser(share, getString(R.string.log_dialog_share)));
                              }
                          })
                          .show();
              }

              @Override public void onDestroyView() {
                  super.onDestroyView();
                  stopOverclockStatusUpdater();
                  rootView = null;
              }
          }

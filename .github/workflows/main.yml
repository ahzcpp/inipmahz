          /**
           * 液态玻璃材质（仿 KernelSU 风格）：
           *  - 卡片本体透明，内容层铺一层「对角柔光渐变」的半透明白，让壁纸自然透出来形成玻璃质感；
           *  - 彻底去掉硬描边/前景边框，阴影压到极轻，避免出现灰黑色方框；
           *  - 强度可调（liquid_glass_intensity 0~100），只改卡片不透明度，不动背景壁纸。
           * 全部可逆——关闭后界面重建即恢复原样。
           */
          public class LiquidGlassHelper {
              public static final String KEY = "liquid_glass";
              public static final String KEY_INTENSITY = "liquid_glass_intensity"; // 0~100，默认55

              public static boolean isEnabled(Context c) {
                  if (c == null) return false;
                  return c.getSharedPreferences("s", Context.MODE_PRIVATE).getBoolean(KEY, false);
              }
              public static int getIntensity(Context c) {
                  if (c == null) return 55;
                  return c.getSharedPreferences("s", Context.MODE_PRIVATE).getInt(KEY_INTENSITY, 55);
              }
              private static int dp(View v, float d) {
                  return (int) (d * v.getResources().getDisplayMetrics().density);
              }
              private static int clampA(int a) { return a < 0 ? 0 : (a > 235 ? 235 : a); }

              public static void applyToTree(View root) { applyToTree(root, -1); }

              /** intensityOverride>=0 时用它(实时预览)，否则读偏好。 */
              public static void applyToTree(View root, int intensityOverride) {
                  if (root == null) return;
                  if (root instanceof CardView) styleCard((CardView) root, false, intensityOverride);
                  if (root instanceof ViewGroup) {
                      ViewGroup g = (ViewGroup) root;
                      for (int i = 0; i < g.getChildCount(); i++) applyToTree(g.getChildAt(i), intensityOverride);
                  }
              }

              public static void styleIfCard(View v) {
                  if (v instanceof CardView) styleCard((CardView) v, false, -1);
              }

              public static void styleCard(CardView cv, boolean strong) { styleCard(cv, strong, -1); }

              public static void styleCard(CardView cv, boolean strong, int intensityOverride) {
                  int intensity = intensityOverride >= 0 ? intensityOverride : getIntensity(cv.getContext());
                  // 基础不透明度：随强度约 20%~64%
                  int base = clampA((int) (52 + intensity * 1.1f)) + (strong ? 24 : 0);
                  float radius = cv.getRadius();
                  if (radius <= 0) radius = dp(cv, 16);

                  // 去掉一切硬描边/前景边框（消除“黑框”），但保留柔和彩色阴影做层次感
                  cv.setForeground(null);
                  if (cv instanceof com.google.android.material.card.MaterialCardView) {
                      com.google.android.material.card.MaterialCardView mc = (com.google.android.material.card.MaterialCardView) cv;
                      mc.setStrokeWidth(0);
                      mc.setStrokeColor(Color.TRANSPARENT);
                  }
                  cv.setCardBackgroundColor(Color.TRANSPARENT);
                  cv.setRadius(radius);
                  cv.setClipToOutline(true);
                  // 柔和的紫调阴影（不是黑硬框）→ 卡片像浮在壁纸上，形成层次感
                  cv.setCardElevation(dp(cv, 6));
                  cv.setMaxCardElevation(dp(cv, 9));
                  if (android.os.Build.VERSION.SDK_INT >= 28) {
                      try {
                          cv.setOutlineSpotShadowColor(Color.argb(140, 92, 78, 150));
                          cv.setOutlineAmbientShadowColor(Color.argb(90, 92, 78, 150));
                      } catch (Exception ignored) {}
                  }

                  // 粉→薰衣草→蓝 的对角磨砂渐变（仿 KernelSU），左上更亮形成高光
                  GradientDrawable g = new GradientDrawable(
                          GradientDrawable.Orientation.TL_BR,
                          new int[]{
                              Color.argb(clampA(base + 30), 255, 240, 248),
                              Color.argb(clampA(base),      226, 214, 246),
                              Color.argb(clampA(base + 6),  210, 222, 250)
                          });
                  g.setShape(GradientDrawable.RECTANGLE);
                  g.setCornerRadius(radius);

                  View target = cv.getChildCount() > 0 ? cv.getChildAt(0) : null;
                  if (target != null) target.setBackground(g);
                  else cv.setBackground(g);
              }

              /** 底部导航栏玻璃化：粉紫半透明、无硬边、轻柔阴影。 */
              public static void styleNav(View nav) {
                  if (nav == null) return;
                  int intensity = getIntensity(nav.getContext());
                  int base = clampA((int) (60 + intensity * 0.7f));
                  GradientDrawable bg = new GradientDrawable(
                          GradientDrawable.Orientation.TL_BR,
                          new int[]{
                              Color.argb(clampA(base + 22), 255, 240, 248),
                              Color.argb(clampA(base),      214, 220, 250)
                          });
                  bg.setShape(GradientDrawable.RECTANGLE);
                  bg.setCornerRadius(dp(nav, 40));
                  nav.setBackground(bg);
                  nav.setElevation(dp(nav, 6));
                  if (android.os.Build.VERSION.SDK_INT >= 28) {
                      try { nav.setOutlineSpotShadowColor(Color.argb(120, 92, 78, 150)); } catch (Exception ignored) {}
                  }
              }

              /** 清除可能残留的背景模糊（确保不改动壁纸本身）。 */
              public static void clearBackdropBlur(View wallpaper) {
                  if (wallpaper == null) return;
                  if (android.os.Build.VERSION.SDK_INT >= 31) {
                      try { wallpaper.setRenderEffect(null); } catch (Exception ignored) {}
                  }
              }
          }

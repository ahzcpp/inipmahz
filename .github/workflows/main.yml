              private void applyWallpaper() {
                  if (wallpaperView == null) return;
                  int type = prefs.getInt("wallpaper_type", 4);
                  float alpha = prefs.getFloat("wallpaper_alpha", 0.3f);
                  wallpaperView.setAlpha(alpha);
                  if (type == 3) {
                      String uriStr = prefs.getString("wallpaper_uri", null);
                      if (uriStr != null) {
                          try {
                              InputStream is = getContentResolver().openInputStream(Uri.parse(uriStr));
                              wallpaperView.setImageBitmap(BitmapFactory.decodeStream(is));
                              return;
                          } catch (Exception ignored) {}
                      }
                  }
                  int resId;
                  if (type == 1) resId = R.drawable.wallpaper_gradient_2;
                  else if (type == 2) resId = R.drawable.wallpaper_gradient_3;
                  else if (type == 5) resId = R.drawable.wallpaper_black;

          package com.pmahz.service;
          import android.app.Service;
          import android.content.Intent;
          import android.graphics.Color;
          import android.graphics.PixelFormat;
          import android.os.Build;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.View;
          import android.view.WindowManager;
          import android.widget.TextView;

          /** 悬浮显示当前刷新率(Hz)的小窗，可拖动。开关在 设置 → 显示/隐藏刷新率。 */
          public class FloatingRefreshService extends Service {
              private WindowManager wm;
              private TextView tv;
              private WindowManager.LayoutParams lp;
              private android.view.Choreographer.FrameCallback frameCallback;
              private long winStart = 0L;
              private int frames = 0;

              @Override public IBinder onBind(Intent intent) { return null; }

              @Override public void onCreate() {
                  super.onCreate();
                  try {
                      wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                      tv = new TextView(this);
                      tv.setText("-- Hz");
                      tv.setTextColor(Color.WHITE);
                      tv.setTextSize(13);
                      tv.setPadding(dp(12), dp(6), dp(12), dp(6));
                      android.graphics.drawable.GradientDrawable bg = new android.graphics.drawable.GradientDrawable();
                      bg.setCornerRadius(dp(20));
                      bg.setColor(Color.argb(170, 20, 20, 28));
                      tv.setBackground(bg);

                      int type = Build.VERSION.SDK_INT >= 26
                              ? WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY
                              : WindowManager.LayoutParams.TYPE_PHONE;
                      lp = new WindowManager.LayoutParams(
                              WindowManager.LayoutParams.WRAP_CONTENT,
                              WindowManager.LayoutParams.WRAP_CONTENT,
                              type,
                              WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                                      | WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL,
                              PixelFormat.TRANSLUCENT);
                      lp.gravity = Gravity.TOP | Gravity.START;
                      lp.x = dp(12);
                      lp.y = dp(60);
                      enableDrag();
                      wm.addView(tv, lp);

                      // 用 Choreographer 实时统计真实帧率：每帧累加，每 0.5 秒算一次 fps，
                      // 掉帧时会反映出来（例如 140.1 Hz），保留一位小数。
                      winStart = System.nanoTime();
                      frames = 0;
                      frameCallback = new android.view.Choreographer.FrameCallback() {
                          @Override public void doFrame(long frameTimeNanos) {
                              frames++;
                              long elapsed = frameTimeNanos - winStart;
                              if (elapsed >= 500000000L) {
                                  float fps = frames * 1000000000f / elapsed;
                                  if (tv != null) tv.setText(String.format(java.util.Locale.US, "%.1f Hz", fps));
                                  winStart = frameTimeNanos;
                                  frames = 0;
                              }
                              try { android.view.Choreographer.getInstance().postFrameCallback(this); } catch (Exception ignored) {}
                          }
                      };
                      android.view.Choreographer.getInstance().postFrameCallback(frameCallback);
                  } catch (Exception e) {
                      stopSelf();
                  }
              }

              private void enableDrag() {
                  tv.setOnTouchListener(new View.OnTouchListener() {
                      float ix, iy; int sx, sy;
                      @Override public boolean onTouch(View v, android.view.MotionEvent e) {
                          switch (e.getAction()) {
                              case android.view.MotionEvent.ACTION_DOWN:
                                  sx = lp.x; sy = lp.y; ix = e.getRawX(); iy = e.getRawY();
                                  return true;
                              case android.view.MotionEvent.ACTION_MOVE:
                                  lp.x = sx + (int) (e.getRawX() - ix);
                                  lp.y = sy + (int) (e.getRawY() - iy);
                                  try { wm.updateViewLayout(tv, lp); } catch (Exception ignored) {}
                                  return true;
                          }
                          return false;
                      }
                  });
              }

              private int dp(float d) { return (int) (d * getResources().getDisplayMetrics().density); }

              @Override public int onStartCommand(Intent intent, int flags, int startId) { return START_STICKY; }

              @Override public void onDestroy() {
                  super.onDestroy();
                  try { if (frameCallback != null) android.view.Choreographer.getInstance().removeFrameCallback(frameCallback); } catch (Exception ignored) {}
                  try { if (wm != null && tv != null) wm.removeView(tv); } catch (Exception ignored) {}
              }
          }

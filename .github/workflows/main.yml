name: 自动编译生成 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 初始化 Java 17 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. 生成固定签名 keystore 与完整项目源码
        run: |
          mkdir -p app
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore app/debug.keystore \
            -storepass android \
            -storetype PKCS12 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

          cat > generate.sh << 'SCRIPTEOF'
          #!/bin/bash
          set -e
          mkdir -p app/src/main/java/com/pmahz/fragment
          mkdir -p app/src/main/java/com/pmahz/adapter
          mkdir -p app/src/main/java/com/pmahz/model
          mkdir -p app/src/main/java/com/pmahz/util
          mkdir -p app/src/main/java/com/pmahz/service
          mkdir -p app/src/main/java/com/pmahz/adb
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/menu
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/values-en
          mkdir -p app/src/main/res/values-ja
          mkdir -p app/src/main/res/values-ug
          mkdir -p app/src/main/res/values-zh-rTW
          mkdir -p app/src/main/res/anim
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/xml

          # ----- 内嵌头像(创作者 爱好者) -----

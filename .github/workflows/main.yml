          public class RootUtils {
              private static final String TAG = "RootUtils";
              public static boolean isRooted() {
                  Process p = null;
                  DataOutputStream os = null; BufferedReader r = null;
                  try {
                      p = Runtime.getRuntime().exec("su");
                      os = new DataOutputStream(p.getOutputStream());
                      os.writeBytes("echo RootOK\nexit\n"); os.flush();
                      r = new BufferedReader(new InputStreamReader(p.getInputStream()));
                      return "RootOK".equals(r.readLine());
                  } catch (Exception e) { return false;
                  } finally {
                      try { if(os != null) os.close();
                      } catch(Exception ignored){}
                      try { if(r != null) r.close();
                      } catch(Exception ignored){}
                      try { if(p != null) p.destroy();
                      } catch(Exception ignored){}
                  }
              }

              public static List<DisplayMode> getDisplayModesFromDumpsys() {
                  List<DisplayMode> list = new ArrayList<>();
                  Process p = null; DataOutputStream os = null; BufferedReader r = null;
                  try {
                      p = Runtime.getRuntime().exec("su");
                      os = new DataOutputStream(p.getOutputStream());
                      os.writeBytes("dumpsys display | grep 'DisplayModeRecord'\nexit\n");
                      os.flush();
                      r = new BufferedReader(new InputStreamReader(p.getInputStream()));
                      String line;
                      Pattern pattern = Pattern.compile("id=(\\d+),\\s*width=(\\d+),\\s*height=(\\d+),\\s*fps=([\\d.]+)");
                      int sfIdx = 0;
                      while ((line = r.readLine()) != null) {
                          Matcher m = pattern.matcher(line);
                          if (m.find()) {
                              int id = Integer.parseInt(m.group(1));
                              int w = Integer.parseInt(m.group(2));
                              int h = Integer.parseInt(m.group(3));
                              float fps = Float.parseFloat(m.group(4));
                              DisplayMode dmode = new DisplayMode(w, h, fps, id);
                              dmode.setSfIndex(sfIdx++);   // dumpsys 列表顺序 = SurfaceFlinger 档位顺序
                              list.add(dmode);
                          }
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "解析dumpsys失败", e);
                  } finally {
                      try { if(os != null) os.close();
                      } catch(Exception ignored){}
                      try { if(r != null) r.close();
                      } catch(Exception ignored){}
                      try { if(p != null) p.destroy();
                      } catch(Exception ignored){}
                  }
                  return list;
              }

              /**
               * 跨设备切换到指定分辨率+刷新率。多管齐下，保证“只要这一档存在就能切过去”：
               *  1) cmd display set-user-preferred-display-mode（Android 12+ 官方接口，按 宽×高×刷新率 精确匹配，
               *     由系统自己挑选正确档位，彻底避免“档位ID算错”的问题）
               *  2) settings 刷新率提示（min==peak 锁定刷新率，顺带压住 LTPO 回落）
               *  3) service call SurfaceFlinger 1035 用“真实档位索引”兜底（老设备 / 上面不生效时）
               *  lock=true 时把 min==peak==hz（锁帧）；lock=false 仍写 min/peak 以确保切到目标。
               */
              /** 生成"两套切换"脚本：先触发原始命令(夹死到目标)；若档位 ID 未变化(说明没生效)，再放宽范围+逐级爬升。整段在一条 shell 内完成，自带 mActiveModeId 检测。 */
              public static String buildSwitchScript(int w, int h, int hz, int sfIndex, java.util.List<Integer> ladder) {
                  StringBuilder s = new StringBuilder();
                  s.append("before=$(dumpsys display 2>/dev/null | grep -m1 -o 'mActiveModeId=[0-9]*' | cut -d= -f2); ");
                  if (w > 0 && h > 0 && hz > 0)
                      s.append("cmd display set-user-preferred-display-mode ").append(w).append(" ").append(h).append(" ").append(hz).append(" 2>/dev/null; ");
                  s.append("settings put system peak_refresh_rate ").append(hz).append(".0; ");
                  s.append("settings put system min_refresh_rate ").append(hz).append(".0; ");
                  s.append("settings put system user_refresh_rate ").append(hz).append("; ");
                  s.append("settings put secure miui_refresh_rate ").append(hz).append("; ");
                  if (sfIndex >= 0)
                      s.append("service call SurfaceFlinger 1035 i32 ").append(sfIndex).append(" >/dev/null 2>&1; ");
                  s.append("usleep 150000; ");
                  s.append("after=$(dumpsys display 2>/dev/null | grep -m1 -o 'mActiveModeId=[0-9]*' | cut -d= -f2); ");
                  s.append("if [ \"$after\" = \"$before\" ]; then ");
                  s.append("settings put system peak_refresh_rate 240.0; ");
                  s.append("settings put system min_refresh_rate 10.0; ");
                  if (ladder != null) {
                      for (int idx : ladder) {
                          s.append("service call SurfaceFlinger 1035 i32 ").append(idx).append(" >/dev/null 2>&1; usleep 40000; ");
                      }
                  }
                  if (sfIndex >= 0)
                      s.append("service call SurfaceFlinger 1035 i32 ").append(sfIndex).append(" >/dev/null 2>&1; ");
                  s.append("fi");
                  return s.toString();
              }

              public static boolean setDisplayMode(int w, int h, int targetHz, int sfIndex) {
                  // 构建逐级爬升阶梯（同分辨率、fps≤目标，按 fps 升序）供第二套使用
                  java.util.List<Integer> ladder = new java.util.ArrayList<>();
                  try {
                      java.util.List<DisplayMode> same = new java.util.ArrayList<>();
                      for (DisplayMode m : getDisplayModesFromDumpsys()) {
                          if (m.getSfIndex() >= 0 && m.getRateInt() <= targetHz
                                  && (w <= 0 || m.getWidth() == w) && (h <= 0 || m.getHeight() == h)) same.add(m);
                      }
                      java.util.Collections.sort(same, (a, b) -> a.getRateInt() - b.getRateInt());
                      for (DisplayMode m : same) ladder.add(m.getSfIndex());
                  } catch (Exception ignored) {}
                  Process process = null;
                  DataOutputStream os = null;
                  try {
                      process = Runtime.getRuntime().exec("su");
                      os = new DataOutputStream(process.getOutputStream());
                      os.writeBytes(buildSwitchScript(w, h, targetHz, sfIndex, ladder));
                      os.writeBytes("\nexit\n"); os.flush();
                      process.waitFor();
                      return true;
                  } catch (Exception e) { return false;
                  } finally {
                      try { if(os != null) os.close();
                      } catch(Exception ignored){}
                      try { if(process != null) process.destroy();
                      } catch(Exception ignored){}
                  }
              }

              /** 解除锁帧：清除用户首选档位，把刷新率范围放开（min=minHz，peak=maxHz），让 LTPO 重新自适应。 */
              public static boolean restoreAdaptive(int minHz, int maxHz) {
                  Process process = null;
                  DataOutputStream os = null;
                  try {
                      process = Runtime.getRuntime().exec("su");
                      os = new DataOutputStream(process.getOutputStream());
                      os.writeBytes("cmd display clear-user-preferred-display-mode 2>/dev/null\n");
                      if (minHz > 0) os.writeBytes("settings put system min_refresh_rate " + minHz + ".0\n");
                      if (maxHz > 0) os.writeBytes("settings put system peak_refresh_rate " + maxHz + ".0\n");
                      os.writeBytes("exit\n"); os.flush();
                      process.waitFor();
                      return true;
                  } catch (Exception e) { return false;
                  } finally {
                      try { if(os != null) os.close(); } catch(Exception ignored){}
                      try { if(process != null) process.destroy(); } catch(Exception ignored){}
                  }
              }

              /** 兼容旧调用：仅有 modeId+hz 时退化为旧逻辑（已不推荐，新代码请用 setDisplayMode）。 */
              public static boolean setRefreshRate(int dumpsysModeId, int targetHz) {
                  return setDisplayMode(0, 0, targetHz, dumpsysModeId - 1);
              }

              /** 开关安卓系统原生刷新率显示（左上角那个）：service call SurfaceFlinger 1034 i32 1/0。 */

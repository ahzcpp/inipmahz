name: 测试最小工作流
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
      - name: 2. 写脚本并运行
        run: |
          cat > hello.sh << 'SCRIPTEOF'
          #!/bin/bash
          set -e
          echo "==============================="
          echo "如果你能看到这行字"
          echo "说明 GitHub Actions 完全正常"
          echo "构建机制没有任何问题"
          echo "==============================="
          mkdir -p out
          echo "测试成功 $(date)" > out/result.txt
          cat out/result.txt
          SCRIPTEOF
          chmod +x hello.sh
          ./hello.sh
      - name: 3. 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: test-result
          path: out/result.txt
